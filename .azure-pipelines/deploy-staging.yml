# Deploy to Staging — Loan Servicing Portal
# Triggered on merge to main. Builds, tests, then triggers Render staging deploy.
# Deploy is gated: pipeline must be GREEN before Render hook fires.

trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: BuildAndTest
    displayName: 'Build & Test'
    jobs:
      - job: Build
        displayName: 'npm ci + lint + test + build'
        timeoutInMinutes: 15

        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | backend/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - script: cd backend && npm ci
            displayName: 'Install dependencies'

          - script: cd backend && npm run lint
            displayName: 'ESLint check'

          - script: cd backend && npm test
            displayName: 'Run unit tests'
            env:
              NODE_ENV: test
              DATABASE_URL: postgresql://test:test@localhost:5432/test_db
              JWT_SECRET: test-secret-that-is-long-enough-32-chars
              JWT_ACCESS_EXPIRY: 15m
              JWT_REFRESH_EXPIRY: 7d
              LOG_LEVEL: error
              PORT: '3001'
              API_PREFIX: /api/v1

          - script: cd backend && npm run build
            displayName: 'TypeScript compile'

  - stage: DeployStaging
    displayName: 'Deploy → Staging (Render)'
    dependsOn: BuildAndTest
    condition: succeeded()
    jobs:
      - deployment: TriggerRenderStagingDeploy
        displayName: 'Trigger Render staging deploy'
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Triggering Render deploy for loan-servicing-api-staging..."

                    RESPONSE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
                      -X POST \
                      -H "Authorization: Bearer $(RENDER_API_KEY)" \
                      -H "Content-Type: application/json" \
                      https://api.render.com/v1/services/$(RENDER_STAGING_SERVICE_ID)/deploys)

                    echo "HTTP status: $RESPONSE"
                    cat /tmp/render_response.json

                    if [ "$RESPONSE" != "201" ]; then
                      echo "##[error]Render deploy trigger failed with HTTP $RESPONSE"
                      exit 1
                    fi

                    DEPLOY_ID=$(cat /tmp/render_response.json | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
                    echo "Deploy ID: $DEPLOY_ID"
                    echo "##vso[task.setvariable variable=DEPLOY_ID]$DEPLOY_ID"
                  displayName: 'Trigger Render deploy'
                  env:
                    RENDER_API_KEY: $(RENDER_API_KEY)

                - script: |
                    echo "Polling Render deploy status (ID: $(DEPLOY_ID))..."
                    MAX_WAIT=600
                    ELAPSED=0
                    INTERVAL=15

                    while [ $ELAPSED -lt $MAX_WAIT ]; do
                      STATUS=$(curl -s \
                        -H "Authorization: Bearer $(RENDER_API_KEY)" \
                        "https://api.render.com/v1/services/$(RENDER_STAGING_SERVICE_ID)/deploys/$(DEPLOY_ID)" \
                        | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")

                      echo "  [$ELAPSED s] Deploy status: $STATUS"

                      if [ "$STATUS" = "live" ]; then
                        echo "Deploy is LIVE!"
                        break
                      elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
                        echo "##[error]Render deploy $STATUS"
                        exit 1
                      fi

                      sleep $INTERVAL
                      ELAPSED=$((ELAPSED + INTERVAL))
                    done

                    if [ $ELAPSED -ge $MAX_WAIT ]; then
                      echo "##[error]Deploy polling timed out after ${MAX_WAIT}s"
                      exit 1
                    fi
                  displayName: 'Poll deploy until live'
                  env:
                    RENDER_API_KEY: $(RENDER_API_KEY)

                - script: |
                    echo "Verifying staging health endpoint..."
                    MAX_RETRIES=5
                    RETRY=0

                    while [ $RETRY -lt $MAX_RETRIES ]; do
                      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                        --connect-timeout 10 \
                        "$(RENDER_STAGING_URL)/health")

                      echo "  Health check attempt $((RETRY+1)): HTTP $HTTP_CODE"

                      if [ "$HTTP_CODE" = "200" ]; then
                        echo "Health check PASSED"
                        exit 0
                      fi

                      RETRY=$((RETRY + 1))
                      sleep 10
                    done

                    echo "##[error]Health check failed after $MAX_RETRIES attempts"
                    exit 1
                  displayName: 'Verify /health endpoint'
                  env:
                    RENDER_STAGING_URL: $(RENDER_STAGING_URL)
