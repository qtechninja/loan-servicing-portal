services:
  # Staging — Node.js API
  - type: web
    name: loan-servicing-api-staging
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USIO_ACH_API_KEY
        sync: false
      - key: USIO_ACH_BASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # Staging — React Frontend
  - type: web
    name: loan-servicing-web-staging
    env: static
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://loan-servicing-api-staging.onrender.com
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false

  # Production — Node.js API
  - type: web
    name: loan-servicing-api
    env: node
    region: oregon
    plan: standard
    branch: main
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USIO_ACH_API_KEY
        sync: false
      - key: USIO_ACH_BASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # Production — React Frontend
  - type: web
    name: loan-servicing-web
    env: static
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://loan-servicing-api.onrender.com
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
