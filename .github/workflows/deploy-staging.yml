name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-api-staging:
    name: Deploy API → Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render staging API deploy
        run: |
          curl -s -f -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_API_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{}' | tee /tmp/deploy-response.json
          echo "Deploy triggered"

      - name: Wait for deploy to complete
        run: |
          SERVICE_ID="${{ secrets.RENDER_STAGING_API_SERVICE_ID }}"
          MAX_WAIT=300
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys?limit=1" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null)
            echo "Deploy status: $STATUS (${ELAPSED}s)"
            if [ "$STATUS" = "live" ]; then echo "Deploy succeeded!"; exit 0; fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then echo "Deploy FAILED"; exit 1; fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "Timed out waiting for deploy"; exit 1

  deploy-web-staging:
    name: Deploy Frontend → Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render staging frontend deploy
        run: |
          curl -s -f -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_WEB_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Wait for frontend deploy
        run: |
          SERVICE_ID="${{ secrets.RENDER_STAGING_WEB_SERVICE_ID }}"
          MAX_WAIT=300
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys?limit=1" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null)
            echo "Frontend status: $STATUS (${ELAPSED}s)"
            if [ "$STATUS" = "live" ]; then echo "Frontend deploy succeeded!"; exit 0; fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then echo "Frontend deploy FAILED"; exit 1; fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "Timed out"; exit 1

  health-check:
    name: Staging Health Check
    runs-on: ubuntu-latest
    needs: [deploy-api-staging]
    steps:
      - name: Verify API health
        run: |
          sleep 10
          curl -f https://loan-servicing-api-staging.onrender.com/health || exit 1
          echo "Staging API is healthy"
